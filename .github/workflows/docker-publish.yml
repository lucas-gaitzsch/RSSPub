name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: read
    steps:
      - name: Checkout release code
        uses: actions/checkout@v4
        if: github.event_name == 'release'

      - name: Checkout branch code
        uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          ref: ${{ github.ref }}

      - name: Update Cargo.toml version
        if: github.event_name == 'release'
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml

      - name: Zip browser extension
        if: github.event_name == 'release'
        run: |
          cd browser_extension
          zip -r ../browser_extension.zip .

      - name: Upload browser extension to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: browser_extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push release image
        uses: docker/build-push-action@v5
        if: github.event_name == 'release'
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lucas-gaitzsch/rsspub:latest
            ghcr.io/lucas-gaitzsch/rsspub:${{ github.event.release.tag_name }}

      - name: Compute manual image tag
        id: manual-tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          SANITIZED_BRANCH="$(printf '%s' "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g; s#-\{2,\}#-#g; s#^[._-]*##; s#[._-]*$##')"

          if [ -z "$SANITIZED_BRANCH" ]; then
            echo "Branch name '$BRANCH_NAME' does not produce a valid image tag." >&2
            exit 1
          fi

          TIMESTAMP="$(date -u +'%Y%m%d-%H%M%S')"
          echo "tag=ghcr.io/lucas-gaitzsch/rsspub:branch-$SANITIZED_BRANCH-$TIMESTAMP" >> "$GITHUB_OUTPUT"
            
      - name: Build and push branch image
        uses: docker/build-push-action@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          context: .
          push: true
          tags: ${{ steps.manual-tag.outputs.tag }}
